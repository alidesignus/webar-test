<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebAR 1x Standart Kamera Testi</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://ar-js-org.github.io/AR.js/aframe/build/aframe-ar.js"></script>

    <script>
      // SADECE GÖRSELİ GÖRÜNCE VİDEOYU BAŞLATAN EN SADE KOD (DOKUNMA/TIKLAMA AYARLARI TAMAMEN SİLİNDİ)
      AFRAME.registerComponent('marker-handler', {
        init: function () {
          const marker = this.el;
          const video = document.querySelector('#vid-giseler');

          // Görsel algılandığı an video otomatik oynar
          marker.addEventListener('markerFound', function () {
            if (video) {
              video.play().catch(err => console.log("Oynatma hatası:", err));
            }
          });

          // Görsel kaybedildiği an video durur ve sıfırlanır
          marker.addEventListener('markerLost', function () {
            if (video) {
              video.pause();
              video.currentTime = 0;
            }
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720;">
      
      <a-assets>
        <video id="vid-giseler" src="videos/giseler.mp4" loop="true" muted playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-marker type="pattern" url="markers/giseler.patt" marker-handler>
        
        <a-video src="#vid-giseler" width="1.2" height="1.2" rotation="-90 0 0"></a-video>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
