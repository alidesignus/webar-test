<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebAR - Çok Dilli HUD İstasyon Bilgi Sistemi</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://ar-js-org.github.io/AR.js/aframe/build/aframe-ar.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
      /* 2B EKRAN ORTALAMA VE DIKEY YERLEŞİM TASARIMI */
      #screen-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none; /* İlk başta gizli, tabela okununca flex olacak */
        flex-direction: column; 
        justify-content: center; 
        align-items: center;    
        z-index: 9999;
        background: rgba(0, 0, 0, 0.4); 
        pointer-events: auto;
      }

      /* EN-AR DİLLERİNDE VİDEONUN ÜSTÜNDE BELİREN KESKİN BAŞLIK PANELİ */
      #video-title {
        color: #ffffff;
        font-family: 'Inter', sans-serif;
        font-size: 1.1rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-align: center;
        background: rgba(0, 0, 0, 0.85); /* Siyah pürüzsüz filigran */
        padding: 10px 20px;
        margin-bottom: 12px; /* Video ile arasında şık boşluk */
        border-radius: 0px; /* Tamamen keskin düz köşeler */
        border: none;
        width: 90%;
        max-width: 1080px;
        box-sizing: border-box;
        display: none; /* Sadece EN ve AR seçildiğinde JS ile açılacak */
      }

      #main-video {
        width: 90%;          
        max-width: 1080px;   
        aspect-ratio: 1 / 1;   
        object-fit: cover;     
        cursor: pointer;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); 
        border-radius: 0px; /* Keskin düz köşeler */
      }

      /* VİDEO İLE BİREBİR EŞİTLENMİŞ MİKRO FİLİGRAN PANEL */
      #info-text {
        margin-top: 20px; /* Video ile arasında net 20px boşluk */
        color: #ffffff;
        font-family: 'Inter', sans-serif;
        font-size: 0.88rem; /* Küçültülmüş mikro yazı boyutu */
        line-height: 1.6;
        font-weight: 400; 
        background: rgba(0, 0, 0, 0.85); /* Siyah pürüzsüz filigran */
        padding: 14px 20px;
        border-radius: 0px; /* Sıfır kavis, tamamen düz keskin köşeler */
        border: none; 
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        width: 90%;
        max-width: 1080px; 
        box-sizing: border-box; 
        display: none; 
      }

      /* Verilerin bold (kalın) olması için */
      #info-text strong {
        font-weight: 700;
        color: #ffffff;
      }

      /* MİNİMALİST ÇOĞUL DİL SEÇİCİ BAR */
      #lang-switcher {
        display: flex;
        gap: 16px;
        margin-bottom: 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        padding-bottom: 6px;
        direction: ltr !important; /* Bayrak çubuğu her zaman soldan sağa kalmalı */
      }

      .lang-btn {
        cursor: pointer;
        opacity: 0.4;
        font-size: 0.85rem;
        transition: opacity 0.2s;
        user-select: none;
      }

      .lang-btn.active {
        opacity: 1;
        font-weight: 700;
        color: #ffcc00; /* Altın sarısı tonu */
      }

      /* Tarayıcı ses engeli uyarısı */
      .audio-alert {
        display: block;
        margin-top: 8px;
        font-size: 0.8rem;
        color: #ffcc00;
        font-weight: 400;
      }

      /* Canlı rötar uyarısının kırmızı görünmesi için */
      .rotar-alert {
        color: #ff3333 !important;
        font-weight: 700;
      }
    </style>

        },

        // Diğer istasyon yönlendirmeleri için hızlı şablon veriler
        "metro.mp4": {
          tr: "🚇 Ankaray / Metro Sefer Sıklığı: <strong>5 dk</strong><br>🚨 Son Sefer Kalkış Saati: <strong>00:10</strong>",

        },
        "market.mp4": {

          en: "🛒 Station Market Area: <strong>Open</strong><br>🕒 Non-Stop Service Hours: <strong>06:00 - 00:00</strong>",
          ar: "🛒 سوبر ماركت المحطة: <strong>مفتوح</strong><br>🕒 ساعات العمل: <strong>06:00 - 00:00</strong>"
        },
        "mescit.mp4": {
          tr: "🕌 Mescit Bölümü Kapasitesi: <strong>80 Kişi</strong><br>🧹 Günlük Periyodik Temizlik: <strong>Yapıldı</strong>",
          en: "🕌 Prayer Room Capacity: <strong>80 People</strong><br>🧹 Daily Periodic Cleaning: <strong>Completed</strong>",

        },
        "ust-kat.mp4": {

          en: "🔽 Area Content: <strong>Indoor Parking & Left Baggage</strong><br>🧼 Free Car Wash: <strong>Active</strong>",
          ar: "🔽 محتوى المنطقة: <strong>مواقف سيارات ومكتب الأمتعة</strong><br>🧼 غسيل سيارات مجاني: <strong>نشط</strong>"
        },
        "sag.mp4": {
          tr: "➡️ Yön Biçimi: <strong>Ana Çıkış Kapısı</strong><br>📍 Peronlara Olan Mesafe: <strong>45 metre</strong>",
          en: "➡️ Direction: <strong>Main Exit Gate</strong><br>📍 Distance to Platforms: <strong>45 meters</strong>",
          ar: "➡️ الاتجاه: <strong>بوابة الخروج الرئيسية</strong><br>📍 المسافة إلى الأرصفة: <strong>45 مترًا</strong>"
        },
        "sol.mp4": {
          tr: "⬅️ Yön Biçimi: <strong>İç Hat Gişeleri</strong><br>📍 Peronlara Olan Mesafe: <strong>20 metre</strong>",
          en: "⬅️ Direction: <strong>Domestic Ticket Counters</strong><br>📍 Distance to Platforms: <strong>20 meters</strong>",
          ar: "⬅️ الاتجاه: <strong>شباك التذاكر المحلي</strong><br>📍 المسافة إلى الأرصفة: <strong>20 مترًا</strong>"
        },
        "yuruyen-merdivenler.mp4": {
          tr: "⚡ Mekanik Durum: <strong>Arızasız / Aktif</strong><br>🏃‍♂️ Akıllı Sensör Modu: <strong>Devrede</strong>",
          en: "⚡ Mechanical Status: <strong>Operational / Active</strong><br>🏃‍♂️ Smart Sensor Mode: <strong>Enabled</strong>",
          ar: "⚡ الحالة الميكانيكية: <strong>تعمل بكفاءة</strong><br>🏃‍♂️ وضع المستشعر الذكي: <strong>مفعل</strong>"
        }
      };

      window.addEventListener('DOMContentLoaded', () => {
        video = document.querySelector('#main-video');
        overlay = document.querySelector('#screen-overlay');
        infoText = document.querySelector('#info-text');
        infoContent = document.querySelector('#info-content');
        videoTitle = document.querySelector('#video-title');

        /* VİDEO KAPATMA AKSİYONU */
        overlay.addEventListener('click', () => {
          isPlaying = false;
          video.pause();
          video.src = ""; 
          clearInterval(countdownInterval);
          infoText.style.display = 'none';
          videoTitle.style.display = 'none';
          infoContent.innerHTML = "";
          videoTitle.innerText = "";
          overlay.style.display = 'none';
        });
      });

      function saniyeyiFormatla(toplamSaniye) {
        if (toplamSaniye <= 0) return "00:00";
        let dakika = Math.floor(toplamSaniye / 60);
        let saniye = toplamSaniye % 60;
        return (dakika < 10 ? "0" : "") + dakika + ":" + (saniye < 10 ? "0" : "") + saniye;
      }

      // METİN İÇERİĞİNİ VE ÜST BAŞLIĞI BASAN ANA MOTOR
      function metniYazdir() {
        if (!currentActiveVideoFile) return;

        // 1. Üst Başlık Yönetimi (Türkçede gizlenir, EN ve AR'de yukarıda açılır)
        if (currentLang === 'tr') {
          videoTitle.style.display = 'none';
        } else {
          videoTitle.innerText = animasyonIsimleri[currentActiveVideoFile][currentLang];
          videoTitle.style.display = 'block';
        }

        // 2. Arapça için Metin Hizalama (RTL) Kontrolü
        if (currentLang === 'ar') {
          infoText.style.direction = 'rtl';
          infoText.style.textAlign = 'right';
        } else {
          infoText.style.direction = 'ltr';
          infoText.style.textAlign = 'left';
        }

        let metinIcerigi = "";

        // PERONLAR VİDEOSUNA ÖZEL GERİ SAYIM VE ARAPÇA SEÇENEĞİ
        if (currentActiveVideoFile === "peronlar.mp4") {
          if (currentLang === 'tr') {
            metinIcerigi = "🚊 Peron 1: Ankara - İstanbul YHT Yanaşıyor ➡️ Kalan Süre: <strong>" + saniyeyiFormatla(peron1Sure) + "</strong><br>" +
                           "🚊 Peron 2: Konya - Ankara YHT Peronda ➡️ Kalan Süre: <strong>" + saniyeyiFormatla(peron2Sure) + "</strong><br>" +
                           "⚠️ Peron 3: Ankara - Sivas YHT Durumu ➡️ <span class='rotar-alert'>25 Dakika Rötar / Gecikme</span>";
          } else if (currentLang === 'en') {
            metinIcerigi = "🚊 Platform 1: Ankara - Istanbul YHT Approaching ➡️ Time Left: <strong>" + saniyeyiFormatla(peron1Sure) + "</strong><br>" +
                           "🚊 Platform 2: Konya - Ankara YHT at Platform ➡️ Time Left: <strong>" + saniyeyiFormatla(peron2Sure) + "</strong><br>" +
                           "⚠️ Platform 3: Ankara - Sivas YHT Status ➡️ <span class='rotar-alert'>25 Minutes Delayed</span>";
          } else if (currentLang === 'ar') {
            metinIcerigi = "🚊 الرصيف ١: قطار أنقرة - إسطنبول يقترب ➡️ الوقت المتبقي: <strong>" + saniyeyiFormatla(peron1Sure) + "</strong><br>" +
                           "🚊 الرصيف ٢: قطار قونية - أنقرة على الرصيف ➡️ الوقت المتبقي: <strong>" + saniyeyiFormatla(peron2Sure) + "</strong><br>" +
                           "⚠️ الرصيف ٣: حالة قطار أنقرة - سيواس ➡️ <span class='rotar-alert'>متأخر ٢٥ دقيقة (تأخير)</span>";
          }
        } else {
          metinIcerigi = anlikVeriler[currentActiveVideoFile][currentLang];
        }

        // Ses engeli uyarısının eklenmesi
        if (video.muted) {
          if (currentLang === 'tr') {
            metinIcerigi += "<span class='audio-alert'>🔊 Sesi açmak için ekrana bir kez dokunun.</span>";
          } else if (currentLang === 'en') {
            metinIcerigi += "<span class='audio-alert'>🔊 Tap anywhere on the screen to unmute audio.</span>";
          } else if (currentLang === 'ar') {
            metinIcerigi += "<span class='audio-alert'>🔊 انقر في أي مكان على الشاشة لتشغيل الصوت.</span>";
          }
        }

        infoContent.innerHTML = metinIcerigi;
      }

      function diliDegistir(lang, event) {
        if (event) event.stopPropagation(); // Kapatma aksiyonunu bloke eder
        currentLang = lang;
        
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        
        metniYazdir();
      }

      /* RADAR TAKİP MOTORU */
      AFRAME.registerComponent('marker-handler', {
        init: function () {
          const marker = this.el;
          const videoFile = marker.getAttribute('data-video'); 

          marker.addEventListener('markerFound', function () {
            if (isPlaying) return; 

            isPlaying = true;
            currentActiveVideoFile = videoFile;
            
            video.src = "videos/" + videoFile;
            video.load();
            
            video.muted = !hasInteracted;
            
            const playPromise = video.play();
            
            if (playPromise !== undefined) {
              playPromise.then(() => {
                overlay.style.display = 'flex';
                infoText.style.display = 'block';
                
                metniYazdir();

                // PERONLAR TIMEOUT TETİKLEYİCİSİ
                clearInterval(countdownInterval);
                if (videoFile === "peronlar.mp4") {
                  countdownInterval = setInterval(() => {
                    if (peron1Sure > 0) peron1Sure--;
                    if (peron2Sure > 0) peron2Sure--;
                    metniYazdir();
                  }, 1000);
                }
              }).catch(err => {
                console.log("Oynatma engeli:", err);
                isPlaying = false;
              });
            }
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">

    <div id="screen-overlay">
      <div id="video-title"></div>

      <video id="main-video" loop playsinline crossorigin="anonymous"></video>
      
      <div id="info-text">
        <div id="lang-switcher">
          <span id="btn-tr" class="lang-btn active" onclick="diliDegistir('tr', event)">🇹🇷 TR</span>
          <span id="btn-en" class="lang-btn" onclick="diliDegistir('en', event)">🇬🇧 EN</span>
          <span id="btn-ar" class="lang-btn" onclick="diliDegistir('ar', event)">🇸🇦 AR</span>
        </div>
        <div id="info-content"></div>
      </div>
    </div>
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720;">
      
      <a-marker type="pattern" url="markers/alt-kat.patt" marker-handler data-video="alt-kat.mp4"></a-marker>
      <a-marker type="pattern" url="markers/asansorler.patt" marker-handler data-video="asansorler.mp4"></a-marker>
