<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebAR Tez Projesi - Hata Ayıklama Sürümü</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      // YEŞİL EKRAN SİLME MOTORU
      AFRAME.registerShader('chromakey', {
        schema: {
          src: {type: 'map'},
          color: {type: 'color', default: '#00ff00'},
          threshold: {type: 'number', default: 0.3}
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec2 vUv;
          uniform sampler2D src;
          uniform vec3 color;
          uniform float threshold;
          void main() {
            vec4 textureColor = texture2D(src, vUv);
            float diff = distance(textureColor.rgb, color);
            if (diff < threshold) {
              discard;
            } else {
              gl_FragColor = textureColor;
            }
          }
        `
      });

      // VİDEO KONTROL SİSTEMİ
      AFRAME.registerComponent('marker-handler', {
        init: function () {
          const marker = this.el;
          const video = document.querySelector('#vid-giseler');

          marker.addEventListener('markerFound', function () {
            if (video) {
              video.play().catch(err => console.log("Oynatma engellendi:", err));
            }
          });

          marker.addEventListener('markerLost', function () {
            if (video) {
              video.pause();
              video.currentTime = 0;
            }
          });
        }
      });

      // MOBİL ENGELİNİ SADECE MEVCUT VİDEO İÇİN KIRAN FONKSİYON
      const KorumayiKir = function () {
        const video = document.querySelector('#vid-giseler');
        if (video) {
          video.play().then(() => {
            video.pause();
            video.currentTime = 0;
          }).catch(err => console.log("Ön yükleme hatası:", err));
        }
        window.removeEventListener('click', KorumayiKir);
        window.removeEventListener('touchstart', KorumayiKir);
      };
      window.addEventListener('click', KorumayiKir);
      window.addEventListener('touchstart', KorumayiKir);
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <video id="vid-giseler" src="videos/giseler.mp4" loop="true" muted playsinline></video>
      </a-assets>

      <a-marker preset="hiro" marker-handler>
        
        <a-box position="0 0.25 0" material="color: red; opacity: 0.7;" scale="0.5 0.5 0.5"></a-box>
        
        <a-plane material="shader: chromakey; src: #vid-giseler; color: #00ff00" width="1.2" height="1.2" rotation="-90 0 0"></a-plane>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
