<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebAR - 2D HUD Dinamik Veri Sistemi</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://ar-js-org.github.io/AR.js/aframe/build/aframe-ar.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">

    <style>
      /* 2B EKRAN ORTALAMA VE DIKEY YERLEŞİM TASARIMI */
      #screen-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none; /* İlk başta gizli, tabela okununca flex olacak */
        flex-direction: column; /* Video ve metni dikeyde alt alta dizer */
        justify-content: center; 
        align-items: center;    
        z-index: 9999;
        background: rgba(0, 0, 0, 0.4); 
        pointer-events: auto;
      }

      #main-video {
        width: 90%;          
        max-width: 1080px;   
        aspect-ratio: 1 / 1;   
        object-fit: cover;     
        cursor: pointer;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); 
      }

      /* VİDEONUN ALTINDAKİ DİNAMİK VERİ SATIRI */
      #info-text {
        margin-top: 20px;
        color: #ffffff;
        font-family: 'Inter', sans-serif;
        font-size: 1.1rem;
        font-weight: 500;
        text-align: center;
        background: rgba(0, 0, 0, 0.75); /* Okunabilirliği artırmak için koyu arka plan */
        padding: 12px 24px;
        border-radius: 30px; /* Modern oval buton tasarımı */
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        max-width: 90%;
        width: auto;
        letter-spacing: 0.5px;
        display: none; /* İlk başta gizli */
      }
    </style>

    <script>
      let video, overlay, infoText;
      let isPlaying = false;

      // ==========================================
      // HER VİDEO İÇİN ANLIK VERİ HAVUZU
      // ==========================================
      const anlikVeriler = {
        "taksi.mp4": "🚕 Güncel Taksi KM Ücreti: 25,00 TL / Açılış: 40,00 TL",
        "giseler.mp4": "⏱️ Anlık Gişe Yoğunluğu: Normal (Ortalama Bekleme: 4 dk)",
        "atm.mp4": "🏧 ATM Durumu: Aktif | Tüm Ortak Kartlara Komisyonsuz",
        "metro.mp4": "🚇 Bir Sonraki Metro Seferi: 3 Dakika Sonra (Peron 1)",
        "otobus.mp4": "🚌 Şehirlerarası Otobüs Seferleri Gecikmesiz Devam Etmektedir",
        "bekleme-salonu.mp4": "🌡️ Salon Sıcaklığı: 22°C | Doluluk Oranı: %45",
        "bebek-bakim-odasi.mp4": "🍼 Bebek Bakım Odası: Açık / Sterilize Edildi",
        "market.mp4": "🛒 Market Çalışma Saatleri: 07:00 - 23:00",
        "mescit.mp4": "🕌 Mescit Bölümü Kullanıma Açık ve Temiz",
        "peronlar.mp4": "ℹ️ Peronlar Bölgesi Canlı Sefer Takibi İçin Panolara Bakınız",
        "restaurant.mp4": "🍽️ Yemek Alanı: Günün Menüsü Aktif",
        "asansorler.mp4": "🛗 Asansör Durumu: Aktif | Maksimum Kapasite: 10 Kişi",
        "kayip-esya-burosu.mp4": "💼 Kayıp Eşya Bürosu Hizmet Saatleri: 09:00 - 18:00",
        "yuruyen-merdivenler.mp4": "⚡ Yürüyen Merdivenler: Aktif / Arıza Yok",
        "ust-kat.mp4": "🔼 Üst Kat: Fast Food ve Çocuk Oyun Alanı",
        "alt-kat.mp4": "🔽 Alt Kat: Otopark, Lavabolar ve Emanet Ofisi",
        "sag.mp4": "➡️ Yönlendirme: Çıkış ve Taksi Durakları Yönü",
        "sol.mp4": "⬅️ Yönlendirme: Şehir İçi Otobüs Peronları Yönü"
      };

      window.addEventListener('DOMContentLoaded', () => {
        video = document.querySelector('#main-video');
        overlay = document.querySelector('#screen-overlay');
        infoText = document.querySelector('#info-text');

        /* KAPATMA AKSİYONU: EKRANA TIKLANDIĞINDA HER ŞEYİ SIFIRLAR */
        overlay.addEventListener('click', () => {
          isPlaying = false;
          video.pause();
          video.src = ""; 
          infoText.style.display = 'none';
          infoText.innerText = "";
          overlay.style.display = 'none';
        });
      });

      /* RADAR TAKİP MOTORU */
      AFRAME.registerComponent('marker-handler', {
        init: function () {
          const marker = this.el;
          const videoFile = marker.getAttribute('data-video'); 

          marker.addEventListener('markerFound', function () {
            if (isPlaying) return; 

            isPlaying = true;
            
            // Videoyu yükle
            video.src = "videos/" + videoFile;
            video.load();
            
            const playPromise = video.play();
            
            if (playPromise !== undefined) {
              playPromise.then(() => {
                // 1. Ekran panelini flex olarak aç
                overlay.style.display = 'flex';
                
                // 2. Havuzdan ilgili videonun metnini çek ve yazdır
                if (anlikVeriler[videoFile]) {
                  infoText.innerText = anlikVeriler[videoFile];
                  infoText.style.display = 'block'; // Yazıyı görünür yap
                } else {
                  infoText.style.display = 'none';
                }
              }).catch(err => {
                console.log("Oynatma engeli:", err);
                isPlaying = false;
              });
            }
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">

    <div id="screen-overlay">
      <video id="main-video" loop muted playsinline crossorigin="anonymous"></video>
      <div id="info-text"></div> </div>
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720;">
      
      <a-marker type="pattern" url="markers/alt-kat.patt" marker-handler data-video="alt-kat.mp4"></a-marker>
      <a-marker type="pattern" url="markers/asansorler.patt" marker-handler data-video="asansorler.mp4"></a-marker>
      <a-marker type="pattern" url="markers/atm.patt" marker-handler data-video="atm.mp4"></a-marker>
      <a-marker type="pattern" url="markers/bebek-bakim-odasi.patt" marker-handler data-video="bebek-bakim-odasi.mp4"></a-marker>
      <a-marker type="pattern" url="markers/bekleme-salonu.patt" marker-handler data-video="bekleme-salonu.mp4"></a-marker>
      <a-marker type="pattern" url="markers/giseler.patt" marker-handler data-video="giseler.mp4"></a-marker>
      <a-marker type="pattern" url="markers/kayip-esya-burosu.patt" marker-handler data-video="kayip-esya-burosu.mp4"></a-marker>
      <a-marker type="pattern" url="markers/market.patt" marker-handler data-video="market.mp4"></a-marker>
      <a-marker type="pattern" url="markers/mescit.patt" marker-handler data-video="mescit.mp4"></a-marker>
      <a-marker type="pattern" url="markers/metro.patt" marker-handler data-video="metro.mp4"></a-marker>
      <a-marker type="pattern" url="markers/otobus.patt" marker-handler data-video="otobus.mp4"></a-marker>
      <a-marker type="pattern" url="markers/peronlar.patt" marker-handler data-video="peronlar.mp4"></a-marker>
      <a-marker type="pattern" url="markers/restaurant.patt" marker-handler data-video="restaurant.mp4"></a-marker>
      <a-marker type="pattern" url="markers/sag.patt" marker-handler data-video="sag.mp4"></a-marker>
      <a-marker type="pattern" url="markers/sol.patt" marker-handler data-video="sol.mp4"></a-marker>
      <a-marker type="pattern" url="markers/taksi.patt" marker-handler data-video="taksi.mp4"></a-marker>
      <a-marker type="pattern" url="markers/ust-kat.patt" marker-handler data-video="ust-kat.mp4"></a-marker>
      <a-marker type="pattern" url="markers/yuruyen-merdivenler.patt" marker-handler data-video="yuruyen-merdivenler.mp4"></a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
