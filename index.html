<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebAR Özel Marker Test Sürümü</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://ar-js-org.github.io/AR.js/aframe/build/aframe-ar.js"></script>

    <script>
      // 1. VİDEO DÖNGÜSÜNÜ KAÇIRMAYAN CANLI RENK SİLME BİLEŞENİ
      AFRAME.registerComponent('chromakey-video', {
        schema: {
          src: {type: 'selector'}
        },
        init: function () {
          const videoElement = this.data.src;
          if (!videoElement) return;

          this.texture = new THREE.VideoTexture(videoElement);
          this.texture.minFilter = THREE.LinearFilter;
          this.texture.magFilter = THREE.LinearFilter;

          this.material = new THREE.ShaderMaterial({
            uniforms: {
              map: { value: this.texture }
            },
            vertexShader: `
              varying vec2 vUv;
              void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
              }
            `,
            fragmentShader: `
              varying vec2 vUv;
              uniform sampler2D map;
              void main() {
                vec4 texColor = texture2D(map, vUv);
                float greenDifference = texColor.g - max(texColor.r, texColor.b);
                
                if (greenDifference > 0.15) {
                  discard; // Yeşili tamamen siler
                } else {
                  gl_FragColor = texColor; // Logoyu korur
                }
              }
            `,
            transparent: true,
            side: THREE.DoubleSide
          });

          this.materialApplied = false;
        },
        tick: function () {
          if (!this.materialApplied) {
            const mesh = this.el.getObject3D('mesh');
            if (mesh) {
              mesh.material = this.material;
              this.materialApplied = true;
            }
          }
          if (this.texture) {
            this.texture.needsUpdate = true;
          }
        }
      });

      // 2. SADECE GÖRSEL BULUNDUĞUNDA VİDEOYU BAŞLATAN EN SADE BİLEŞEN
      AFRAME.registerComponent('video-handler', {
        init: function () {
          const marker = this.el;
          const video = document.querySelector('#vid-giseler');

          marker.addEventListener('markerFound', function () {
            if (video) {
              video.play().catch(err => console.log("Video oynatılamadı:", err));
            }
          });

          marker.addEventListener('markerLost', function () {
            if (video) {
              video.pause();
              video.currentTime = 0;
            }
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720;">
      
      <a-assets>
        <video id="vid-giseler" src="videos/giseler.mp4" loop="true" muted playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-marker type="pattern" url="markers/giseler.patt" video-handler>
        
        <a-plane chromakey-video="src: #vid-giseler" width="1.2" height="1.2" rotation="-90 0 0"></a-plane>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
