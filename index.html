<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebAR Tez Projesi - Yönlendirme Sistemleri</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      // 1. SİHİRLİ YEŞİL EKRAN YOK ETME MOTORU (CHROMA KEY SHADER)
      AFRAME.registerShader('chromakey', {
        schema: {
          src: {type: 'map'},
          color: {type: 'color', default: '#00ff00'},
          threshold: {type: 'number', default: 0.3} // Yeşil temizleme hassasiyeti
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec2 vUv;
          uniform sampler2D src;
          uniform vec3 color;
          uniform float threshold;
          void main() {
            vec4 textureColor = texture2D(src, vUv);
            float diff = distance(textureColor.rgb, color);
            if (diff < threshold) {
              discard; // Yeşili tamamen yok et (şeffaf yap)
            } else {
              gl_FragColor = textureColor; // Gerçek pikselleri göster
            }
          }
        `
      });

      // 2. AKILLI VİDEO OYNATICI VE DURDURUCU SİSTEMİ
      AFRAME.registerComponent('marker-handler', {
        init: function () {
          const marker = this.el;
          const videoId = marker.getAttribute('data-video');
          const video = document.querySelector(videoId);

          // Tabela kameraya girdiğinde videoyu oynat
          marker.addEventListener('markerFound', function () {
            if (video) {
              video.play();
            }
          });

          // Tabela kameradan çıktığında videoyu durdur ve başa sar
          marker.addEventListener('markerLost', function () {
            if (video) {
              video.pause();
              video.currentTime = 0;
            }
          });
        }
      });
    </script>
  </head>
