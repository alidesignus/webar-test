<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebAR - Minimalist HUD Keskin Hatlı Veri Sistemi</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://ar-js-org.github.io/AR.js/aframe/build/aframe-ar.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
      /* 2B EKRAN ORTALAMA VE DIKEY YERLEŞİM TASARIMI */
      #screen-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none; /* İlk başta gizli, tabela okununca flex olacak */
        flex-direction: column; 
        justify-content: center; 
        align-items: center;    
        z-index: 9999;
        background: rgba(0, 0, 0, 0.4); 
        pointer-events: auto;
      }

      #main-video {
        width: 90%;          
        max-width: 1080px;   
        aspect-ratio: 1 / 1;   
        object-fit: cover;     
        cursor: pointer;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); 
        border-radius: 0px; /* Keskin köşeler */
      }

      /* VİDEO İLE BİREBİR GENİŞLİKTE, KESKİN HATLI FİLİGRAN METİN PANELİ */
      #info-text {
        margin-top: 20px; /* İstediğin net 20px boşluk */
        color: #ffffff;
        font-family: 'Inter', sans-serif;
        font-size: 1rem;
        line-height: 1.6;
        font-weight: 400; /* Yazılar normal */
        text-align: left;  
        background: rgba(0, 0, 0, 0.75); /* Tam istediğin siyah filigran görünümü */
        padding: 16px 24px;
        border-radius: 0px; /* Kavisler tamamen kaldırıldı, düz keskin köşeler */
        border: none; /* Dış kontür/çizgi tamamen kaldırıldı */
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        width: 90%;
        max-width: 1080px; /* Video genişliğiyle milimetrik eşitleme */
        box-sizing: border-box; /* Padding değerlerinin genişliği saptırmasını önler */
        display: none; 
      }

      /* Sayısal ve kritik verilerin bold (kalın) olması için */
      #info-text strong {
        font-weight: 700;
        color: #ffffff;
      }

      /* Tarayıcı ses engeli uyarısı */
      .audio-alert {
        display: block;
        margin-top: 6px;
        font-size: 0.85rem;
        color: #ffcc00;
        font-weight: 400;
      }
    </style>

    <script>
      let video, overlay, infoText;
      let isPlaying = false;
      let hasInteracted = false;

      // Kullanıcının ekrana dokunup dokunmadığını takip eder (Ses kilidini açmak için)
      window.addEventListener('click', () => { hasInteracted = true; });
      window.addEventListener('touchstart', () => { hasInteracted = true; });

      // ==========================================
      // GÜNCELLENMİŞ İKİ SATIRLI, KESKİN VE BOLD VERİ HAVUZU
      // ==========================================
      const anlikVeriler = {
        "asansorler.mp4": "🛗 Asansör Kapasitesi: <strong>14 Kişi</strong><br>💪 Maksimum Taşıma Ağırlığı: <strong>1050 kg</strong>",
        "atm.mp4": "🏧 ATM Güncel Durum: <strong>Aktif</strong><br>💰 Günlük Çekilebilir Toplam Nakit: <strong>250.000 TL</strong>",
        "bebek-bakim-odasi.mp4": "🍼 Oda Kullanım Durumu: <strong>Müsait / Boş</strong><br>✨ Son Dezenfeksiyon Saati: <strong>09:30</strong>",
        "bekleme-salonu.mp4": "🌡️ Salon Sıcaklığı: <strong>22°C</strong><br>👥 Güncel Doluluk Oranı: <strong>%45</strong>",
        "giseler.mp4": "🎫 Ankara - İstanbul YHT Ekonomi Bilet: <strong>430,00 TL</strong><br>💼 Ankara - İstanbul YHT Business Bilet: <strong>650,00 TL</strong>",
        "kayip-esya-burosu.mp4": "💼 Büro Çalışma Durumu: <strong>Açık</strong><br>🕒 Hafta İçi Çalışma Saatleri: <strong>09:00 - 18:00</strong>",
        "peronlar.mp4": "📢 Aktif Sefer Durumu: <strong>Rötarsız / Zamanında</strong><br>🚊 Toplam Peron Hattı: <strong>12 Hat Aktif</strong>",
        "restaurant.mp4": "🕒 Restaurant Hizmet Saatleri: <strong>07:00 - 22:00</strong><br>🍽️ Günün Menüsü (Kavurma + Pilav): <strong>180,00 TL</strong>",
        "taksi.mp4": "🚕 Taksi KM Ücreti: <strong>45,00 TL</strong><br>💵 Açılış Ücreti: <strong>65,00 TL</strong>",
        
        // Diğer istasyon yönlendirmeleri için şık ve hızlı şablon veriler
        "metro.mp4": "🚇 Ankaray / Metro Sefer Sıklığı: <strong>5 dk</strong><br>🚨 Son Sefer Kalkış Saati: <strong>00:10</strong>",
        "otobus.mp4": "🚌 Şehirlerarası Peron Durumu: <strong>Seferler Aktif</strong><br>⏱️ Ortalama Kalkış Sıklığı: <strong>15 dk</strong>",
        "market.mp4": "🛒 İstasyon Market Alanı: <strong>Açık</strong><br>🕒 Kesintisiz Hizmet Saatleri: <strong>06:00 - 00:00</strong>",
        "mescit.mp4": "🕌 Mescit Bölümü Kapasitesi: <strong>80 Kişi</strong><br>🧹 Günlük Periyodik Temizlik: <strong>Yapıldı</strong>",
        "ust-kat.mp4": "🔼 Bölge İçeriği: <strong>Yemek Alanı (Food Court)</strong><br>🛍️ Alışveriş Mağazaları: <strong>Mevcut</strong>",
        "alt-kat.mp4": "🔽 Bölge İçeriği: <strong>Kapalı Otopark & Emanet Ofisi</strong><br>🧼 Ücretsiz Oto Yıkama: <strong>Aktif</strong>",
        "sag.mp4": "➡️ Yön Biçimi: <strong>Ana Çıkış Kapısı</strong><br>📍 Peronlara Olan Mesafe: <strong>45 metre</strong>",
        "sol.mp4": "⬅️ Yön Biçimi: <strong>İç Hat Gişeleri</strong><br>📍 Peronlara Olan Mesafe: <strong>20 metre</strong>",
        "yuruyen-merdivenler.mp4": "⚡ Mekanik Durum: <strong>Arızasız / Aktif</strong><br>🏃‍♂️ Akıllı Sensör Modu: <strong>Devrede</strong>"
      };

      window.addEventListener('DOMContentLoaded', () => {
        video = document.querySelector('#main-video');
        overlay = document.querySelector('#screen-overlay');
        infoText = document.querySelector('#info-text');

        /* VİDEO KAPATMA AKSİYONU */
        overlay.addEventListener('click', () => {
          isPlaying = false;
          video.pause();
          video.src = ""; 
          infoText.style.display = 'none';
          infoText.innerHTML = "";
          overlay.style.display = 'none';
        });
      });

      /* RADAR TAKİP MOTORU */
      AFRAME.registerComponent('marker-handler', {
        init: function () {
          const marker = this.el;
          const videoFile = marker.getAttribute('data-video'); 

          marker.addEventListener('markerFound', function () {
            if (isPlaying) return; 

            isPlaying = true;
            
            video.src = "videos/" + videoFile;
            video.load();
            
            // Kullanıcı ekrana dokunduysa videolar direkt sesli başlar
            video.muted = !hasInteracted;
            
            const playPromise = video.play();
            
            if (playPromise !== undefined) {
              playPromise.then(() => {
                overlay.style.display = 'flex';
                
                if (anlikVeriler[videoFile]) {
                  let metinIcerigi = anlikVeriler[videoFile];
                  
                  // Tarayıcı ses korumasına takıldıysa alta ufak bir uyarı ekler
                  if (video.muted) {
                    metinIcerigi += "<span class='audio-alert'>🔊 Sesi açmak için ekrana bir kez dokunun.</span>";
                  }
                  
                  infoText.innerHTML = metinIcerigi;
                  infoText.style.display = 'block';
                }
              }).catch(err => {
                console.log("Oynatma engeli:", err);
                isPlaying = false;
              });
            }
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">

    <div id="screen-overlay">
      <video id="main-video" loop playsinline crossorigin="anonymous"></video>
      <div id="info-text"></div> </div>
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720;">
      
      <a-marker type="pattern" url="markers/alt-kat.patt" marker-handler data-video="alt-kat.mp4"></a-marker>
      <a-marker type="pattern" url="markers/asansorler.patt" marker-handler data-video="asansorler.mp4"></a-marker>
      <a-marker type="pattern" url="markers/atm.patt" marker-handler data-video="atm.mp4"></a-marker>
      <a-marker type="pattern" url="markers/bebek-bakim-odasi.patt" marker-handler data-video="bebek-bakim-odasi.mp4"></a-marker>
      <a-marker type="pattern" url="markers/bekleme-salonu.patt" marker-handler data-video="bekleme-salonu.mp4"></a-marker>
      <a-marker type="pattern" url="markers/giseler.patt" marker-handler data-video="giseler.mp4"></a-marker>
      <a-marker type="pattern" url="markers/kayip-esya-burosu.patt" marker-handler data-video="kayip-esya-burosu.mp4"></a-marker>
      <a-marker type="pattern" url="markers/market.patt" marker-handler data-video="market.mp4"></a-marker>
      <a-marker type="pattern" url="markers/mescit.patt" marker-handler data-video="mescit.mp4"></a-marker>
      <a-marker type="pattern" url="markers/metro.patt" marker-handler data-video="metro.mp4"></a-marker>
      <a-marker type="pattern" url="markers/otobus.patt" marker-handler data-video="otobus.mp4"></a-marker>
      <a-marker type="pattern" url="markers/peronlar.patt" marker-handler data-video="peronlar.mp4"></a-marker>
      <a-marker type="pattern" url="markers/restaurant.patt" marker-handler data-video="restaurant.mp4"></a-marker>
      <a-marker type="pattern" url="markers/sag.patt" marker-handler data-video="sag.mp4"></a-marker>
      <a-marker type="pattern" url="markers/sol.patt" marker-handler data-video="sol.mp4"></a-marker>
      <a-marker type="pattern" url="markers/taksi.patt" marker-handler data-video="taksi.mp4"></a-marker>
      <a-marker type="pattern" url="markers/ust-kat.patt" marker-handler data-video="ust-kat.mp4"></a-marker>
      <a-marker type="pattern" url="markers/yuruyen-merdivenler.patt" marker-handler data-video="yuruyen-merdivenler.mp4"></a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
