<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebAR - Minimalist HUD Sesli Veri Sistemi</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://ar-js-org.github.io/AR.js/aframe/build/aframe-ar.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
      /* 2B EKRAN ORTALAMA VE DIKEY YERLEŞİM TASARIMI */
      #screen-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none; /* İlk başta gizli, tabela okununca flex olacak */
        flex-direction: column; 
        justify-content: center; 
        align-items: center;    
        z-index: 9999;
        background: rgba(0, 0, 0, 0.4); 
        pointer-events: auto;
      }

      #main-video {
        width: 90%;          
        max-width: 1080px;   
        aspect-ratio: 1 / 1;   
        object-fit: cover;     
        cursor: pointer;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); 
        border-radius: 8px;
      }

      /* MİNİMALİST, MODERN VE DÜZENLİ BİLGİ PANELİ */
      #info-text {
        margin-top: 24px;
        color: #ffffff;
        font-family: 'Inter', sans-serif;
        font-size: 1rem;
        line-height: 1.6;
        font-weight: 400; /* Yazılar normal */
        text-align: left;  /* İçerik düzenli dursun diye sola yaslı */
        background: rgba(20, 20, 20, 0.8); /* Minimal koyu arka plan */
        backdrop-filter: blur(15px); /* Premium cam efekti */
        -webkit-backdrop-filter: blur(15px);
        padding: 16px 28px;
        border-radius: 14px; /* Minimal hafif oval köşeler */
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        max-width: 90%;
        width: fit-content; /* İçeriğe göre otomatik daralan şık kutu */
        display: none; 
      }

      /* Fiyatların bold (kalın) olması için */
      #info-text strong {
        font-weight: 700;
        color: #ffffff;
      }

      /* Tarayıcı ses engeli uyarısı */
      .audio-alert {
        display: block;
        margin-top: 6px;
        font-size: 0.85rem;
        color: #ffcc00;
        font-weight: 400;
      }
    </style>

    <script>
      let video, overlay, infoText;
      let isPlaying = false;
      let hasInteracted = false;

      // Kullanıcının ekrana dokunup dokunmadığını takip eder (Ses kilidini açmak için)
      window.addEventListener('click', () => { hasInteracted = true; });
      window.addEventListener('touchstart', () => { hasInteracted = true; });

      // ==========================================
      // İSTEDİĞİN FORMATTA İKİ SATIRLI VE BOLD VERİ HAVUZU
      // ==========================================
      const anlikVeriler = {
        "taksi.mp4": "🚕 Taksi KM Ücreti: <strong>45,00 TL</strong><br>💵 Açılış Ücreti: <strong>65,00 TL</strong>",
        "giseler.mp4": "⏱️ Anlık Gişe Yoğunluğu: <strong>Normal</strong><br>⏳ Ortalama Bekleme: <strong>4 dk</strong>",
        "atm.mp4": "🏧 ATM Durumu: <strong>Aktif</strong><br>💳 Tüm Kartlar: <strong>Komisyonsuz</strong>",
        "metro.mp4": "🚇 Metro Sefer Sıklığı: <strong>5 dk</strong><br>🚨 Son Sefer Saati: <strong>00:00</strong>",
        "otobus.mp4": "🚌 Peron Durumu: <strong>Araç Hazır</strong><br>⏱️ Kalkış Saatine: <strong>12 dk</strong>",
        "bekleme-salonu.mp4": "🌡️ Salon Sıcaklığı: <strong>22°C</strong><br>👥 Güncel Doluluk: <strong>%45</strong>",
        "bebek-bakim-odasi.mp4": "🍼 Bebek Odası: <strong>Müsait</strong><br>✨ Hijyen Kontrolü: <strong>Yapıldı</strong>",
        "market.mp4": "🛒 Market Durumu: <strong>Açık</strong><br>🕒 Kapanış Saati: <strong>23:00</strong>",
        "mescit.mp4": "🕌 Mescit Durumu: <strong>Açık</strong><br>🧹 Son Temizlik: <strong>1 saat önce</strong>",
        "peronlar.mp4": "ℹ️ Aktif Peron Sayısı: <strong>12 Peron</strong><br>📢 Güncel Rötar: <strong>Yok</strong>",
        "restaurant.mp4": "🍽️ Yemek Alanı: <strong>Açık</strong><br>🍔 Menü Çeşitliliği: <strong>Zengin</strong>",
        "asansorler.mp4": "🛗 Asansör Grubu: <strong>Aktif</strong><br>🔧 Periyodik Bakım: <strong>Tamamlandı</strong>",
        "kayip-esya-burosu.mp4": "💼 Büro Durumu: <strong>Açık</strong><br>🕒 Mesai Bitişi: <strong>18:00</strong>",
        "yuruyen-merdivenler.mp4": "⚡ Teknik Durum: <strong>Arızasız</strong><br>🏃‍♂️ Enerji Tasarrufu: <strong>Aktif</strong>",
        "ust-kat.mp4": "🔼 Bölge İçeriği: <strong>Yemek Alanı</strong><br>👶 Çocuk Parkı: <strong>Mevcut</strong>",
        "alt-kat.mp4": "🔽 Bölge İçeriği: <strong>Otopark</strong><br>🧼 Oto Yıkama: <strong>Aktif</strong>",
        "sag.mp4": "➡️ Yön Biçimi: <strong>Çıkış Kapısı</strong><br>📍 Mesafe: <strong>45 metre</strong>",
        "sol.mp4": "⬅️ Yön Biçimi: <strong>İç Hatlar</strong><br>📍 Mesafe: <strong>20 metre</strong>"
      };

      window.addEventListener('DOMContentLoaded', () => {
        video = document.querySelector('#main-video');
        overlay = document.querySelector('#screen-overlay');
        infoText = document.querySelector('#info-text');

        /* VİDEO KAPATMA AKSİYONU */
        overlay.addEventListener('click', () => {
          isPlaying = false;
          video.pause();
          video.src = ""; 
          infoText.style.display = 'none';
          infoText.innerHTML = "";
          overlay.style.display = 'none';
        });
      });

      /* RADAR TAKİP MOTORU */
      AFRAME.registerComponent('marker-handler', {
        init: function () {
          const marker = this.el;
          const videoFile = marker.getAttribute('data-video'); 

          marker.addEventListener('markerFound', function () {
            if (isPlaying) return; 

            isPlaying = true;
            
            video.src = "videos/" + videoFile;
            video.load();
            
            // Eğer kullanıcı daha önce ekrana dokunduysa direkt sesli başlat
            video.muted = !hasInteracted;
            
            const playPromise = video.play();
            
            if (playPromise !== undefined) {
              playPromise.then(() => {
                overlay.style.display = 'flex';
                
                if (anlikVeriler[videoFile]) {
                  let metinIcerigi = anlikVeriler[videoFile];
                  
                  // Eğer tarayıcı engeli yüzünden video sessiz başladıysa alta uyarı ekle
                  if (video.muted) {
                    metinIcerigi += "<span class='audio-alert'>🔊 Sesi açmak için ekrana bir kez dokunun.</span>";
                  }
                  
                  infoText.innerHTML = metinIcerigi;
                  infoText.style.display = 'block';
                }
              }).catch(err => {
                console.log("Oynatma engeli:", err);
                isPlaying = false;
              });
            }
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">

    <div id="screen-overlay">
      <video id="main-video" loop playsinline crossorigin="anonymous"></video>
      <div id="info-text"></div> 
    </div>
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720;">
      
      <a-marker type="pattern" url="markers/alt-kat.patt" marker-handler data-video="alt-kat.mp4"></a-marker>
      <a-marker type="pattern" url="markers/asansorler.patt" marker-handler data-video="asansorler.mp4"></a-marker>
      <a-marker type="pattern" url="markers/atm.patt" marker-handler data-video="atm.mp4"></a-marker>
      <a-marker type="pattern" url="markers/bebek-bakim-odasi.patt" marker-handler data-video="bebek-bakim-odasi.mp4"></a-marker>
      <a-marker type="pattern" url="markers/bekleme-salonu.patt" marker-handler data-video="bekleme-salonu.mp4"></a-marker>
      <a-marker type="pattern" url="markers/giseler.patt" marker-handler data-video="giseler.mp4"></a-marker>
      <a-marker type="pattern" url="markers/kayip-esya-burosu.patt" marker-handler data-video="kayip-esya-burosu.mp4"></a-marker>
      <a-marker type="pattern" url="markers/market.patt" marker-handler data-video="market.mp4"></a-marker>
      <a-marker type="pattern" url="markers/mescit.patt" marker-handler data-video="mescit.mp4"></a-marker>
      <a-marker type="pattern" url="markers/metro.patt" marker-handler data-video="metro.mp4"></a-marker>
      <a-marker type="pattern" url="markers/otobus.patt" marker-handler data-video="otobus.mp4"></a-marker>
      <a-marker type="pattern" url="markers/peronlar.patt" marker-handler data-video="peronlar.mp4"></a-marker>
      <a-marker type="pattern" url="markers/restaurant.patt" marker-handler data-video="restaurant.mp4"></a-marker>
      <a-marker type="pattern" url="markers/sag.patt" marker-handler data-video="sag.mp4"></a-marker>
      <a-marker type="pattern" url="markers/sol.patt" marker-handler data-video="sol.mp4"></a-marker>
      <a-marker type="pattern" url="markers/taksi.patt" marker-handler data-video="taksi.mp4"></a-marker>
      <a-marker type="pattern" url="markers/ust-kat.patt" marker-handler data-video="ust-kat.mp4"></a-marker>
      <a-marker type="pattern" url="markers/yuruyen-merdivenler.patt" marker-handler data-video="yuruyen-merdivenler.mp4"></a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
