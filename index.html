<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebAR - 2D HUD Kare Video Sistemi</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://ar-js-org.github.io/AR.js/aframe/build/aframe-ar.js"></script>

    <style>
      /* 2B EKRAN ORTALAMA VE TAM KARE (1:1) SINIRLAMA TASARIMI */
      #screen-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none; /* İlk başta gizli, tabela okununca flex olacak */
        justify-content: center; /* Yatayda tam ortalama */
        align-items: center;    /* Dikeyde tam ortalama */
        z-index: 9999;
        background: rgba(0, 0, 0, 0.4); /* Arkadaki kamera görüntüsünü hafifçe karartır */
        pointer-events: auto;
      }

      #main-video {
        width: 90%;             /* Mobil ekranlarda sağdan soldan şık bir pay bırakır */
        max-width: 1080px;      /* En fazla 1080px genişliğe çıkabilir */
        aspect-ratio: 1 / 1;    /* 1080x1080 formatını tüm cihazlarda zorunlu kılar */
        object-fit: cover;      /* Videonun kare alana kusursuz oturmasını sağlar */
        cursor: pointer;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); /* Videonun etrafına derinlik katan gölge */
      }
    </style>

    <script>
      let video, overlay;
      let isPlaying = false;

      window.addEventListener('DOMContentLoaded', () => {
        video = document.querySelector('#main-video');
        overlay = document.querySelector('#screen-overlay');

        /* VİDEOYA VEYA EKRANDAKİ KARARTIYA TIKLANDIĞINDA VİDEOYU KAPATMA SİSTEMİ */
        overlay.addEventListener('click', () => {
          isPlaying = false;
          video.pause();
          video.src = ""; // Videoyu RAM hafızasından tamamen temizler
          overlay.style.display = 'none';
        });
      });

      /* AKILLI RADAR TAKİP MOTORU */
      AFRAME.registerComponent('marker-handler', {
        init: function () {
          const marker = this.el;
          const videoFile = marker.getAttribute('data-video'); 

          marker.addEventListener('markerFound', function () {
            if (isPlaying) return; // Zaten bir video oynuyorsa çakışmasın

            isPlaying = true;
            
            // Videoyu dinamik olarak çağırır
            video.src = "videos/" + videoFile;
            video.load();
            
            const playPromise = video.play();
            
            if (playPromise !== undefined) {
              playPromise.then(() => {
                // Video oynamaya başladığı an ekran ortasındaki kare paneli açar
                overlay.style.display = 'flex';
              }).catch(err => {
                console.log("Oynatma engeli:", err);
                isPlaying = false;
              });
            }
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">

    <div id="screen-overlay">
      <video id="main-video" loop muted playsinline crossorigin="anonymous"></video>
    </div>
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720;">
      
      <a-marker type="pattern" url="markers/alt-kat.patt" marker-handler data-video="alt-kat.mp4"></a-marker>
      <a-marker type="pattern" url="markers/asansorler.patt" marker-handler data-video="asansorler.mp4"></a-marker>
      <a-marker type="pattern" url="markers/atm.patt" marker-handler data-video="atm.mp4"></a-marker>
      <a-marker type="pattern" url="markers/bebek-bakim-odasi.patt" marker-handler data-video="bebek-bakim-odasi.mp4"></a-marker>
      <a-marker type="pattern" url="markers/bekleme-salonu.patt" marker-handler data-video="bekleme-salonu.mp4"></a-marker>
      <a-marker type="pattern" url="markers/giseler.patt" marker-handler data-video="giseler.mp4"></a-marker>
      <a-marker type="pattern" url="markers/kayip-esya-burosu.patt" marker-handler data-video="kayip-esya-burosu.mp4"></a-marker>
      <a-marker type="pattern" url="markers/market.patt" marker-handler data-video="market.mp4"></a-marker>
      <a-marker type="pattern" url="markers/mescit.patt" marker-handler data-video="mescit.mp4"></a-marker>
      <a-marker type="pattern" url="markers/metro.patt" marker-handler data-video="metro.mp4"></a-marker>
      <a-marker type="pattern" url="markers/otobus.patt" marker-handler data-video="otobus.mp4"></a-marker>
      <a-marker type="pattern" url="markers/peronlar.patt" marker-handler data-video="peronlar.mp4"></a-marker>
      <a-marker type="pattern" url="markers/restaurant.patt" marker-handler data-video="restaurant.mp4"></a-marker>
      <a-marker type="pattern" url="markers/sag.patt" marker-handler data-video="sag.mp4"></a-marker>
      <a-marker type="pattern" url="markers/sol.patt" marker-handler data-video="sol.mp4"></a-marker>
      <a-marker type="pattern" url="markers/taksi.patt" marker-handler data-video="taksi.mp4"></a-marker>
      <a-marker type="pattern" url="markers/ust-kat.patt" marker-handler data-video="ust-kat.mp4"></a-marker>
      <a-marker type="pattern" url="markers/yuruyen-merdivenler.patt" marker-handler data-video="yuruyen-merdivenler.mp4"></a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
