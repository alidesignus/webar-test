<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebAR Hiro Görsel Testi</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://ar-js-org.github.io/AR.js/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720;">
      
      <a-assets>
        <img id="img-plane" src="videos/plane.jpg" crossorigin="anonymous">
      </a-assets>

      <a-marker preset="hiro">
        
        <a-image src="#img-plane" width="1.2" height="1.2" rotation="-90 0 0"></a-image>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
