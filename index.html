<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebAR Yeşil Ekran Silme Testi</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://ar-js-org.github.io/AR.js/aframe/build/aframe-ar.js"></script>

    <script>
      // 1. SİHİRLİ YEŞİL EKRAN YOK ETME MOTORU (CHROMA KEY SHADER)
      AFRAME.registerShader('chromakey', {
        schema: {
          src: {type: 'map'},
          color: {type: 'color', default: '#00ff00'},
          threshold: {type: 'number', default: 0.3} // Yeşil temizleme hassasiyeti
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          varying vec2 vUv;
          uniform sampler2D src;
          uniform vec3 color;
          uniform float threshold;
          void main() {
            vec4 textureColor = texture2D(src, vUv);
            float diff = distance(textureColor.rgb, color);
            if (diff < threshold) {
              discard; // Yeşili tamamen yok et (şeffaf yap)
            } else {
              gl_FragColor = textureColor; // Gerçek pikselleri göster
            }
          }
        `
      });

      // 2. SADECE GÖRSEL BULUNDUĞUNDA VİDEOYU BAŞLATAN EN SADE BİLEŞEN
      AFRAME.registerComponent('video-handler', {
        init: function () {
          const marker = this.el;
          const video = document.querySelector('#vid-giseler');

          marker.addEventListener('markerFound', function () {
            if (video) {
              video.play().catch(err => console.log("Video oynatılamadı:", err));
            }
          });

          marker.addEventListener('markerLost', function () {
            if (video) {
              video.pause();
              video.currentTime = 0; // Tabela kaybolunca videoyu sıfırla
            }
          });
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720;">
      
      <a-assets>
        <video id="vid-giseler" src="videos/giseler.mp4" loop="true" muted playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-marker preset="hiro" video-handler>
        
        <a-plane material="shader: chromakey; src: #vid-giseler; color: #00ff00" width="1.2" height="1.2" rotation="-90 0 0"></a-plane>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
